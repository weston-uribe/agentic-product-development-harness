name: Harness Reconcile Stranded Issues

# Recovers stranded workflow issues when webhooks were missed.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      issue:
        description: "Optional Linear issue key to reconcile (e.g. WES-13)"
        required: false
      dry_run:
        description: "Evaluate only; no Linear writes or dispatch"
        required: false
        default: "false"
      dispatch:
        description: "When eligible, send repository_dispatch"
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.HARNESS_GITHUB_TOKEN }}
      GITHUB_DISPATCH_TOKEN: ${{ secrets.HARNESS_GITHUB_TOKEN }}
      HARNESS_CONFIG_JSON_B64: ${{ secrets.HARNESS_CONFIG_JSON_B64 }}
      HARNESS_CONFIG_FINGERPRINT: ${{ vars.HARNESS_CONFIG_FINGERPRINT }}
      GITHUB_DISPATCH_REPOSITORY: ${{ github.repository }}
      P_DEV_WORKFLOW_STATE_STORE_MODE: managed_github

    steps:
      - name: Checkout harness repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reconcile workflow issues
        env:
          ISSUE_KEY: ${{ github.event.inputs.issue || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          DO_DISPATCH: ${{ github.event.inputs.dispatch || 'true' }}
        run: |
          set -euo pipefail
          ARGS=(--json)
          if [ -n "$ISSUE_KEY" ]; then
            ARGS+=(--issue "$ISSUE_KEY")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ "$DO_DISPATCH" = "true" ]; then
            ARGS+=(--dispatch)
          fi
          npm run harness:reconcile-workflow -- "${ARGS[@]}"
