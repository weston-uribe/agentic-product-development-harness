name: Harness Auto Runner

on:
  repository_dispatch:
    types: [linear_issue_status_changed, production_promoted]
  workflow_dispatch:
    inputs:
      issue:
        description: "Linear issue key, e.g. WES-13 (harness run)"
        required: false
      phase:
        description: "Harness phase (auto, planning, implementation, handoff, revision, merge)"
        required: false
        default: auto
      sync_repo:
        description: "Repo config id for production sync, e.g. portfolio (runs sync-production instead of harness run)"
        required: false

permissions:
  contents: read

jobs:
  gate:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_repo == '') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'linear_issue_status_changed')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      issue_key: ${{ steps.inputs.outputs.issue_key }}
      phase: ${{ steps.route.outputs.phase }}
      repo_config_id: ${{ steps.route.outputs.repo_config_id }}
      base_branch: ${{ steps.route.outputs.base_branch }}
      target_repo: ${{ steps.route.outputs.target_repo }}
      linear_status: ${{ steps.route.outputs.linear_status }}
      merge_concurrency_group: ${{ steps.route.outputs.merge_concurrency_group }}
      should_run: ${{ steps.route.outputs.should_run }}
      trigger: ${{ steps.inputs.outputs.trigger }}
      linear_delivery_id: ${{ steps.inputs.outputs.linear_delivery_id }}
      input_phase: ${{ steps.inputs.outputs.phase }}

    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.HARNESS_GITHUB_TOKEN }}

    steps:
      - name: Resolve inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_key=${{ github.event.inputs.issue }}" >> "$GITHUB_OUTPUT"
            echo "phase=${{ github.event.inputs.phase || 'auto' }}" >> "$GITHUB_OUTPUT"
            echo "trigger=workflow_dispatch" >> "$GITHUB_OUTPUT"
            echo "linear_delivery_id=" >> "$GITHUB_OUTPUT"
          else
            echo "issue_key=${{ github.event.client_payload.issueKey }}" >> "$GITHUB_OUTPUT"
            echo "phase=auto" >> "$GITHUB_OUTPUT"
            echo "trigger=repository_dispatch" >> "$GITHUB_OUTPUT"
            echo "linear_delivery_id=${{ github.event.client_payload.linearDeliveryId || '' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate issue key
        run: |
          if [ -z "${{ steps.inputs.outputs.issue_key }}" ]; then
            echo "Missing issue key in workflow inputs."
            exit 1
          fi

      - name: Checkout harness repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve route
        id: route
        run: |
          set +e
          npm run harness:resolve-route -- \
            --issue "${{ steps.inputs.outputs.issue_key }}" \
            --phase "${{ steps.inputs.outputs.phase }}" \
            --json \
            --github-output
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi

      - name: Write gate summary
        if: always()
        run: |
          {
            echo "## Harness Gate"
            echo ""
            echo "- Issue: \`${{ steps.inputs.outputs.issue_key }}\`"
            echo "- Input phase: \`${{ steps.inputs.outputs.phase }}\`"
            echo "- Resolved phase: \`${{ steps.route.outputs.phase }}\`"
            echo "- Should run: \`${{ steps.route.outputs.should_run }}\`"
            echo "- Repo: \`${{ steps.route.outputs.repo_config_id }}\`"
            echo "- Base branch: \`${{ steps.route.outputs.base_branch }}\`"
            echo "- Merge concurrency group: \`${{ steps.route.outputs.merge_concurrency_group }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  run-harness:
    needs: gate
    if: >-
      needs.gate.result == 'success' &&
      needs.gate.outputs.should_run == 'true' &&
      needs.gate.outputs.phase != 'merge'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: harness-${{ needs.gate.outputs.issue_key }}
      cancel-in-progress: false

    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.HARNESS_GITHUB_TOKEN }}

    steps:
      - name: Checkout harness repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Doctor
        run: npm run harness:doctor

      - name: Write dispatch metadata
        run: |
          mkdir -p runs
          cat > runs/dispatch-metadata.json <<EOF
          {
            "githubRunId": "${{ github.run_id }}",
            "linearDeliveryId": "${{ needs.gate.outputs.linear_delivery_id }}",
            "trigger": "${{ needs.gate.outputs.trigger }}",
            "issueKey": "${{ needs.gate.outputs.issue_key }}",
            "phase": "${{ needs.gate.outputs.phase }}",
            "repoConfigId": "${{ needs.gate.outputs.repo_config_id }}",
            "baseBranch": "${{ needs.gate.outputs.base_branch }}",
            "receivedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Run harness
        id: harness
        run: |
          set +e
          PHASE="${{ needs.gate.outputs.input_phase }}"
          if [ "$PHASE" = "auto" ]; then
            PHASE="${{ needs.gate.outputs.phase }}"
          fi
          OUTPUT=$(npm run harness:run -- --issue "${{ needs.gate.outputs.issue_key }}" --phase "$PHASE" --json 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "$OUTPUT" > harness-run-output.json
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## Harness Auto Runner"
            echo ""
            echo "- Issue: \`${{ needs.gate.outputs.issue_key }}\`"
            echo "- Phase: \`${{ needs.gate.outputs.phase }}\`"
            echo "- Trigger: \`${{ needs.gate.outputs.trigger }}\`"
            echo "- Linear delivery ID: \`${{ needs.gate.outputs.linear_delivery_id }}\`"
            echo "- Harness exit code: \`${{ steps.harness.outputs.exit_code }}\`"
            echo ""
            if [ -f harness-run-output.json ]; then
              echo "### Harness output"
              echo '```json'
              cat harness-run-output.json
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-run-${{ needs.gate.outputs.issue_key }}-${{ github.run_id }}
          path: |
            runs/${{ needs.gate.outputs.issue_key }}/**
            runs/dispatch-metadata.json
            harness-run-output.json
          retention-days: 30
          if-no-files-found: ignore

  run-merge:
    needs: gate
    if: >-
      needs.gate.result == 'success' &&
      needs.gate.outputs.should_run == 'true' &&
      needs.gate.outputs.phase == 'merge'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: harness-merge-${{ needs.gate.outputs.merge_concurrency_group }}
      cancel-in-progress: false

    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.HARNESS_GITHUB_TOKEN }}

    steps:
      - name: Checkout harness repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Doctor
        run: npm run harness:doctor -- --profile merge

      - name: Write dispatch metadata
        run: |
          mkdir -p runs
          cat > runs/dispatch-metadata.json <<EOF
          {
            "githubRunId": "${{ github.run_id }}",
            "linearDeliveryId": "${{ needs.gate.outputs.linear_delivery_id }}",
            "trigger": "${{ needs.gate.outputs.trigger }}",
            "issueKey": "${{ needs.gate.outputs.issue_key }}",
            "phase": "merge",
            "repoConfigId": "${{ needs.gate.outputs.repo_config_id }}",
            "baseBranch": "${{ needs.gate.outputs.base_branch }}",
            "mergeConcurrencyGroup": "${{ needs.gate.outputs.merge_concurrency_group }}",
            "receivedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Run merge
        id: merge
        run: |
          set +e
          OUTPUT=$(npm run harness:run -- --issue "${{ needs.gate.outputs.issue_key }}" --phase merge --json 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "$OUTPUT" > harness-run-output.json
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## Harness Merge Runner"
            echo ""
            echo "- Issue: \`${{ needs.gate.outputs.issue_key }}\`"
            echo "- Merge concurrency group: \`${{ needs.gate.outputs.merge_concurrency_group }}\`"
            echo "- Trigger: \`${{ needs.gate.outputs.trigger }}\`"
            echo "- Harness exit code: \`${{ steps.merge.outputs.exit_code }}\`"
            echo ""
            if [ -f harness-run-output.json ]; then
              echo "### Harness output"
              echo '```json'
              cat harness-run-output.json
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-merge-${{ needs.gate.outputs.issue_key }}-${{ github.run_id }}
          path: |
            runs/${{ needs.gate.outputs.issue_key }}/**
            runs/dispatch-metadata.json
            harness-run-output.json
          retention-days: 30
          if-no-files-found: ignore

  sync-production:
    if: >-
      (github.event_name == 'repository_dispatch' && github.event.action == 'production_promoted') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_repo != '')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: harness-production-sync-${{ github.event.client_payload.repo || github.event.inputs.sync_repo }}
      cancel-in-progress: true

    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.HARNESS_GITHUB_TOKEN }}

    steps:
      - name: Resolve sync inputs
        id: sync
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "repo=${{ github.event.inputs.sync_repo }}" >> "$GITHUB_OUTPUT"
            echo "trigger=workflow_dispatch" >> "$GITHUB_OUTPUT"
            echo "production_branch=" >> "$GITHUB_OUTPUT"
            echo "source_repo=" >> "$GITHUB_OUTPUT"
            echo "after=" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${{ github.event.client_payload.repo }}" >> "$GITHUB_OUTPUT"
            echo "trigger=repository_dispatch" >> "$GITHUB_OUTPUT"
            echo "production_branch=${{ github.event.client_payload.productionBranch || '' }}" >> "$GITHUB_OUTPUT"
            echo "source_repo=${{ github.event.client_payload.sourceRepo || '' }}" >> "$GITHUB_OUTPUT"
            echo "after=${{ github.event.client_payload.after || '' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate repo id
        run: |
          if [ -z "${{ steps.sync.outputs.repo }}" ]; then
            echo "Missing repo id in production_promoted payload or sync_repo input."
            exit 1
          fi

      - name: Checkout harness repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Write dispatch metadata
        run: |
          mkdir -p runs
          cat > runs/dispatch-metadata.json <<EOF
          {
            "githubRunId": "${{ github.run_id }}",
            "trigger": "${{ steps.sync.outputs.trigger }}",
            "eventAction": "${{ github.event.action }}",
            "repo": "${{ steps.sync.outputs.repo }}",
            "productionBranch": "${{ steps.sync.outputs.production_branch }}",
            "sourceRepo": "${{ steps.sync.outputs.source_repo }}",
            "after": "${{ steps.sync.outputs.after }}",
            "receivedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Run production sync
        id: sync_production
        run: |
          set +e
          OUTPUT=$(npm run harness:sync-production -- --repo "${{ steps.sync.outputs.repo }}" --json 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "$OUTPUT" > sync-production-output.json
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## Harness Production Sync"
            echo ""
            echo "- Repo: \`${{ steps.sync.outputs.repo }}\`"
            echo "- Trigger: \`${{ steps.sync.outputs.trigger }}\`"
            echo "- Production branch: \`${{ steps.sync.outputs.production_branch }}\`"
            echo "- Source repo: \`${{ steps.sync.outputs.source_repo }}\`"
            echo "- After commit: \`${{ steps.sync.outputs.after }}\`"
            echo "- Exit code: \`${{ steps.sync_production.outputs.exit_code }}\`"
            echo ""
            if [ -f sync-production-output.json ]; then
              echo "### Sync output"
              echo '```json'
              cat sync-production-output.json
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sync artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-sync-${{ steps.sync.outputs.repo }}-${{ github.run_id }}
          path: |
            runs/**
            runs/dispatch-metadata.json
            sync-production-output.json
          retention-days: 30
          if-no-files-found: ignore
